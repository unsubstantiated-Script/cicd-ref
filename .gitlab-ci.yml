stages:
  - validate
  - test
  - build
  - package
  - scan
  - deploy

variables:
  APP_NAME: "cicdref"
  BINARY_PATH: "bin/api"
  IMAGE_TAG: "$CI_COMMIT_SHORT_SHA"
  IMAGE_NAME: "$CI_REGISTRY_IMAGE:$IMAGE_TAG"

default:
  interruptable: true

validate:
  stage: validate
  image: golang:1.25
  script:
    - go version
    - make tidy
    - make lint

test:
  stage: test
  image: golang:1.25
  script:
    - make test

build:
  stage: build
  image: golang:1.25
  script:
    - make build
  artifacts:
    paths:
      - bin/api
    expire_in: 1 hour

package:
  stage: package
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  script:
    - docker version
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    - docker build -t "$IMAGE_NAME" .
    - docker push "$IMAGE_NAME"

scan:
  stage: scan
  image: alpine:3.20
  script:
    - echo "Simulating security scan for $IMAGE_NAME"
    - echo "In real env this may run SAST, image scan, dependency scan"
    - test -n "$CI_COMMIT_SHORT_SHA"

deploy_dev:
  stage: deploy
  image: alpine:3.20
  script:
    - echo "Deploying $IMAGE_NAME to development environment"
    - echo "kubectl apply -f deploy/dev/deployment.yaml"
  only:
    - main

deploy_prod:
  stage: deploy
  image: alpine:3.20
  script:
    - echo "Deploying release to prod"
    - echo "kubectl apply -f deploy/prod/deployment.yaml"
  only:
    - tags